name: Build

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.LanguageFailover/Jellyfin.Plugin.LanguageFailover.csproj

      - name: Build
        run: dotnet build Jellyfin.Plugin.LanguageFailover/Jellyfin.Plugin.LanguageFailover.csproj --configuration Release --no-restore
